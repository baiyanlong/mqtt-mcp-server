<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="tower" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
  </defs>

  <!-- 背景圆 -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>

  <!-- 信号塔 -->
  <rect x="65" y="60" width="8" height="80" rx="2" fill="url(#tower)"/>

  <!-- 信号波 -->
  <path d="M 77 75 Q 95 60 110 75" fill="none" stroke="#3fb950" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 77 90 Q 100 68 120 90" fill="none" stroke="#3fb950" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M 77 105 Q 105 80 128 105" fill="none" stroke="#3fb950" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- AI 大脑/芯片 -->
  <rect x="110" y="55" width="35" height="35" rx="6" fill="#1f6feb33" stroke="#58a6ff" stroke-width="1.5"/>
  <circle cx="122" cy="65" r="2.5" fill="#58a6ff"/>
  <circle cx="133" cy="65" r="2.5" fill="#58a6ff"/>
  <circle cx="122" cy="76" r="2.5" fill="#58a6ff"/>
  <circle cx="133" cy="76" r="2.5" fill="#58a6ff"/>

  <!-- 连线 -->
  <line x1="73" y1="80" x2="110" y2="72" stroke="#8b949e" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 底部状态灯 -->
  <circle cx="69" cy="148" r="4" fill="#3fb950" opacity="0.8"/>
  <circle cx="69" cy="148" r="8" fill="none" stroke="#3fb950" stroke-width="0.8" opacity="0.3"/>

  <!-- MQTT 协议标注 -->
  <text x="100" y="172" text-anchor="middle" fill="#8b949e" font-family="SF Mono, monospace" font-size="11" font-weight="600">MQTT ▸ MCP ▸ AI</text>
</svg>
