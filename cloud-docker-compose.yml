# MQTT MCP Cloud — 多节点管理云服务
#
# 启动：
#   docker-compose up -d
#
# 访问：
#   Dashboard: http://localhost:8080
#   API:       http://localhost:8080/api/v1/
#   健康检查:  http://localhost:8080/health

version: "3.8"

services:
  # ── PostgreSQL 数据库 ──
  postgres:
    image: postgres:16-alpine
    container_name: mqttmcp-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: mqttmcp
      POSTGRES_PASSWORD: mqttmcp
      POSTGRES_DB: mqttmcp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mqttmcp"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── 云服务 ──
  cloud:
    image: mqtt-mcp-cloud:latest
    container_name: mqttmcp-cloud
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://mqttmcp:mqttmcp@postgres:5432/mqttmcp
    depends_on:
      postgres:
        condition: service_healthy
    command: ["--listen", "0.0.0.0:8080"]

volumes:
  pgdata:
