# GitHub Actions：推送 tag 自动构建 ARM64 + x86_64 二进制，发布到 Release
#
# 使用方式：
#   git tag v0.3.0 && git push --tags
#
# 完成后在 https://github.com/baiyanlong/mqtt-mcp-server/releases 下载

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:

  # ── ARM64 (树莓派 3B+/4/5) ──
  build-arm64:
    name: ARM64 (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 安装 ARM64 交叉编译器（GCC，不走 zig 避免网络超时）
      - name: 安装交叉编译器
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq gcc-aarch64-linux-gnu

      # 安装 Rust + ARM 目标
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      # 编译（用 GCC 交叉链接器）
      - name: 交叉编译 ARM64
        run: |
          cargo build --release --target aarch64-unknown-linux-gnu
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      # 重命名
      - name: 重命名二进制
        run: |
          mv target/aarch64-unknown-linux-gnu/release/mqtt-mcp-server \
             mqtt-mcp-server-arm64

      # 上传到 Release
      - uses: softprops/action-gh-release@v2
        with:
          files: mqtt-mcp-server-arm64

  # ── x86_64 (普通 Linux 服务器) ──
  build-x86_64:
    name: x86_64 Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: 编译 x86_64
        run: cargo build --release

      - name: 重命名
        run: |
          mv target/release/mqtt-mcp-server mqtt-mcp-server-x86_64

      - uses: softprops/action-gh-release@v2
        with:
          files: mqtt-mcp-server-x86_64
